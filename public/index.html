<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LobbyControl - Gestión de Ley de Lobby</title>
  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Tailwind CSS local -->
  <script src="/vendor/tailwind.js"></script>
  <!-- Lucide Icons local -->
  <script src="/vendor/lucide.min.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            brand: {
              50: '#f0f7ff',
              100: '#e0effe',
              500: '#3b82f6',
              600: '#2563eb',
              700: '#1d4ed8',
              900: '#1e3a8a',
            }
          }
        }
      }
    }
  </script>
  <script src="/js/theme-init.js?v=1.0.21"></script>
  <link rel="stylesheet" href="/css/style.css?v=1.0.21">
  <!-- html2pdf.js local -->
  <script src="/vendor/html2pdf.bundle.min.js"></script>
  <!-- Chart.js local -->
  <script src="/vendor/chart.js"></script>
</head>
<body class="h-full flex flex-col font-sans antialiased overflow-hidden">

  <!-- NOTIFICACIONES DENTRO DE LA APP -->
  <div id="toast-container" class="fixed bottom-5 right-5 z-50 flex flex-col gap-2"></div>

  <!-- HEADER / TOP NAV -->
  <header class="h-20 shrink-0 bg-slate-900 border-b border-slate-800 flex items-center justify-between px-6 z-40 hidden">
    <div class="flex items-center gap-4">
      <img src="/logo_secum.png" alt="Secretaría Municipal Maipú" class="h-16 w-auto object-contain">
      <div class="hidden lg:flex items-center gap-2 bg-slate-950/40 px-3 py-1.5 rounded-xl border border-slate-800/80">
        <span class="relative flex h-2 w-2">
          <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
          <span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
        </span>
        <div class="text-left leading-none">
          <span class="text-[9px] text-slate-400 font-bold uppercase tracking-wider block mb-0.5">Últ. Actualización</span>
          <span id="db-last-update" class="text-[10px] text-emerald-300 font-bold font-mono">Cargando...</span>
        </div>
      </div>
    </div>

    
    <!-- NAVEGACIÓN SUPERIOR -->
    <nav class="hidden md:flex items-center gap-1.5 bg-slate-950/40 p-1 rounded-xl border border-slate-800/80">
      <button onclick="switchView('dashboard')" id="nav-dashboard" class="flex items-center gap-2 px-3 py-1.5 rounded-lg text-xs font-medium transition-all duration-200 text-slate-300 hover:text-white hover:bg-slate-800">
        <i data-lucide="layout-dashboard" class="h-3.5 w-3.5"></i>
        <span>Dashboard</span>
      </button>
      <button onclick="switchView('solicitudes')" id="nav-solicitudes" class="flex items-center gap-2 px-3 py-1.5 rounded-lg text-xs font-medium transition-all duration-200 text-slate-300 hover:text-white hover:bg-slate-800">
        <i data-lucide="file-text" class="h-3.5 w-3.5"></i>
        <span>Solicitudes</span>
      </button>
      <button onclick="switchView('publicadas')" id="nav-publicadas" class="flex items-center gap-2 px-3 py-1.5 rounded-lg text-xs font-medium transition-all duration-200 text-slate-300 hover:text-white hover:bg-slate-800">
        <i data-lucide="calendar-check" class="h-3.5 w-3.5"></i>
        <span>Audiencias</span>
      </button>
      <button onclick="switchView('sujetos_pasivos')" id="nav-sujetos_pasivos" class="flex items-center gap-2 px-3 py-1.5 rounded-lg text-xs font-medium transition-all duration-200 text-slate-300 hover:text-white hover:bg-slate-800">
        <i data-lucide="users" class="h-3.5 w-3.5"></i>
        <span>Sujetos Pasivos</span>
      </button>
      <button onclick="switchView('reportes')" id="nav-reportes" class="flex items-center gap-2 px-3 py-1.5 rounded-lg text-xs font-medium transition-all duration-200 text-slate-300 hover:text-white hover:bg-slate-800">
        <i data-lucide="bar-chart-2" class="h-3.5 w-3.5"></i>
        <span>Reportes</span>
      </button>
      <button onclick="switchView('administracion')" id="nav-administracion" class="flex items-center gap-2 px-3 py-1.5 rounded-lg text-xs font-medium transition-all duration-200 text-slate-300 hover:text-white hover:bg-slate-800">
        <i data-lucide="settings" class="h-3.5 w-3.5"></i>
        <span>Administración</span>
      </button>
    </nav>

    <div class="flex items-center gap-4">
      <!-- Widget de Alertas (Semáforo) -->
      <div id="alerts-widget-container" class="relative"></div>

      <!-- Botón de Modo Claro/Oscuro -->
      <button id="theme-toggle" onclick="toggleTheme()" class="h-8 w-8 rounded-xl flex items-center justify-center border border-slate-800 hover:border-slate-700 bg-slate-950/40 text-slate-300 hover:text-white transition-all duration-200" title="Cambiar de Modo">
        <i data-lucide="sun" class="h-4 w-4"></i>
      </button>

      <!-- Perfil del Usuario Logueado -->
      <div id="user-profile-menu" class="relative flex items-center gap-3">
        <!-- Contenedor clickeable del perfil -->
        <div onclick="toggleProfileDropdown(event)" class="flex items-center gap-2 cursor-pointer group select-none">
          <div class="text-right hidden sm:block">
            <p id="header-user-rol" class="text-xs font-semibold text-slate-200 group-hover:text-white transition-colors">Cargando...</p>
            <p id="header-user-nombre" class="text-[10px] text-slate-400 group-hover:text-slate-300 transition-colors">...</p>
          </div>
          <div id="header-user-initials" class="h-8 w-8 rounded-full bg-slate-800 border border-slate-700 flex items-center justify-center text-slate-300 font-semibold text-xs group-hover:border-brand-500 transition-all duration-150" title="Perfil de usuario">
            --
          </div>
        </div>

        <!-- Dropdown flotante del perfil -->
        <div id="profile-dropdown" class="hidden absolute right-0 top-10 mt-2 w-48 glass-card text-[var(--text-primary)] rounded-2xl p-2 z-50 flex flex-col gap-1">
          <button onclick="triggerEditProfile(event)" class="w-full px-3 py-2 rounded-xl text-xs font-semibold flex items-center gap-2 text-[var(--text-secondary)] hover:text-[var(--text-primary)] hover:bg-slate-50/80 dark:hover:bg-slate-800 transition-all text-left cursor-pointer border-0 bg-transparent">
            <i data-lucide="user" class="h-3.5 w-3.5 text-brand-500 dark:text-brand-400"></i>
            <span>Editar Perfil</span>
          </button>
          <button onclick="triggerAlertCenter(event)" class="w-full px-3 py-2 rounded-xl text-xs font-semibold flex items-center gap-2 text-[var(--text-secondary)] hover:text-[var(--text-primary)] hover:bg-slate-50/80 dark:hover:bg-slate-800 transition-all text-left cursor-pointer border-0 bg-transparent">
            <i data-lucide="bell" class="h-3.5 w-3.5 text-brand-500 dark:text-brand-400"></i>
            <span>Centro de Alertas</span>
          </button>
          <div class="border-t border-[var(--border-ui)] my-1"></div>
          <button onclick="logout()" class="w-full px-3 py-2 rounded-xl text-xs font-semibold flex items-center gap-2 text-rose-600 dark:text-rose-400 hover:text-rose-700 dark:hover:text-rose-300 hover:bg-rose-50 dark:hover:bg-rose-950/20 transition-all text-left cursor-pointer border-0 bg-transparent">
            <i data-lucide="log-out" class="h-3.5 w-3.5"></i>
            <span>Cerrar Sesión</span>
          </button>
        </div>
      </div>
    </div>
  </header>

  <!-- CUERPO PRINCIPAL (SIDEBAR + MAIN CONTENT) -->
  <div class="flex flex-1 overflow-hidden">
    
    <!-- CONTENEDOR PRINCIPAL RESPONSIVO -->
    <main class="flex-1 overflow-y-auto bg-slate-950 p-8 relative">
      <div id="top-loading-bar" class="absolute top-0 left-0 h-[3px] bg-brand-500 transition-all duration-200 w-0 opacity-0 z-50"></div>
      <div class="max-w-7xl mx-auto space-y-6" id="main-content">
        <!-- Las vistas se cargarán aquí de forma dinámica -->
      </div>
    </main>

  </div>

  <!-- MODALES COMPARTIDOS (SE CARGAN/ABREN CON JS) -->
  <div id="modal-container" class="fixed inset-0 z-50 hidden bg-slate-950/80 backdrop-blur-sm flex items-center justify-center p-4">
    <!-- El contenido del modal se inyecta dinámicamente -->
  </div>

  <!-- SCRIPTS PRINCIPALES -->
  <script src="/js/helpers.js?v=1.0.23"></script>
  <script src="/js/components.js?v=1.0.23"></script>
  <script src="/js/views.js?v=1.0.23"></script>
  <script src="/js/session-timeout.js?v=1.0.23"></script>
  <script src="/js/app.js?v=1.0.23"></script>

  <!-- Global Tooltip Element -->
  <div id="global-tooltip" class="fixed hidden z-50 bg-slate-900 border border-slate-800 text-slate-200 text-xs px-3.5 py-2.5 rounded-xl shadow-2xl backdrop-blur-md max-w-xs pointer-events-none transition-opacity duration-150 opacity-0">
    <div class="text-[9px] font-semibold text-brand-400 uppercase tracking-wider mb-1">Cargo Completo</div>
    <div id="global-tooltip-text" class="font-medium text-slate-200 leading-relaxed"></div>
  </div>
</body>
</html>
