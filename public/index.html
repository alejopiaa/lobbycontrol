<!DOCTYPE html>
<html lang="es" class="h-full">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LobbyControl - Gestión de Ley de Lobby</title>
  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- Tailwind CSS local -->
  <script src="/vendor/tailwind.js"></script>
  <!-- Lucide Icons local -->
  <script src="/vendor/lucide.min.js"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            brand: {
              50: '#f0f7ff',
              100: '#e0effe',
              500: '#3b82f6',
              600: '#2563eb',
              700: '#1d4ed8',
              900: '#1e3a8a',
            }
          }
        }
      }
    }
  </script>
  <script src="/js/theme-init.js?v=1.0.21"></script>
  <link rel="stylesheet" href="/css/style.css?v=1.0.21">
  <!-- html2pdf.js local -->
  <script src="/vendor/html2pdf.bundle.min.js"></script>
  <!-- Chart.js local -->
  <script src="/vendor/chart.js"></script>
</head>
<body class="h-full flex flex-col font-sans antialiased overflow-hidden">

  <!-- NOTIFICACIONES DENTRO DE LA APP -->
  <div id="toast-container" class="fixed bottom-5 right-5 z-50 flex flex-col gap-2"></div>

  <!-- HEADER / TOP NAV -->
  <header class="h-28 shrink-0 bg-slate-900 border-b border-slate-800 flex items-center px-6 z-40 hidden header-premium">
    <!-- COLUMNA IZQUIERDA: LOGO + CO-BRANDING -->
    <div class="flex-1 flex items-center justify-start gap-4">
      <img src="/logo_secum.png" alt="Secretaría Municipal Maipú" class="h-20 w-auto object-contain header-logo">
      <div class="h-10 w-[1px] bg-slate-200 dark:bg-slate-800 hidden sm:block"></div>
      <div class="flex flex-col justify-center leading-none">
        <span class="text-sm font-extrabold text-slate-800 dark:text-slate-100 tracking-wider">LobbyControl</span>
        <span class="text-[9px] font-semibold text-slate-500 dark:text-slate-400 mt-1 uppercase tracking-wide">Ley de Lobby N° 20.730</span>
      </div>
    </div>

    <!-- COLUMNA CENTRAL: NAVEGACIÓN SUPERIOR (CENTRADA MATEMÁTICAMENTE) -->
    <div class="flex-none flex justify-center">
      <nav class="hidden md:flex items-center gap-1 bg-slate-950/40 p-1 rounded-full border border-slate-800/80 header-nav-capsule">
        <button onclick="switchView('dashboard')" id="nav-dashboard" class="flex items-center gap-2 px-3.5 py-1.5 rounded-full text-xs font-medium transition-all duration-200 text-slate-300 hover:text-white hover:bg-slate-800">
          <i data-lucide="layout-dashboard" class="h-3.5 w-3.5"></i>
          <span>Dashboard</span>
        </button>
        <button onclick="switchView('solicitudes')" id="nav-solicitudes" class="flex items-center gap-2 px-3.5 py-1.5 rounded-full text-xs font-medium transition-all duration-200 text-slate-300 hover:text-white hover:bg-slate-800">
          <i data-lucide="file-text" class="h-3.5 w-3.5"></i>
          <span>Solicitudes</span>
        </button>
        <button onclick="switchView('publicadas')" id="nav-publicadas" class="flex items-center gap-2 px-3.5 py-1.5 rounded-full text-xs font-medium transition-all duration-200 text-slate-300 hover:text-white hover:bg-slate-800">
          <i data-lucide="calendar-check" class="h-3.5 w-3.5"></i>
          <span>Audiencias</span>
        </button>
        <button onclick="switchView('sujetos_pasivos')" id="nav-sujetos_pasivos" class="flex items-center gap-2 px-3.5 py-1.5 rounded-full text-xs font-medium transition-all duration-200 text-slate-300 hover:text-white hover:bg-slate-800">
          <i data-lucide="users" class="h-3.5 w-3.5"></i>
          <span>Sujetos Pasivos</span>
        </button>
        <button onclick="switchView('reportes')" id="nav-reportes" class="flex items-center gap-2 px-3.5 py-1.5 rounded-full text-xs font-medium transition-all duration-200 text-slate-300 hover:text-white hover:bg-slate-800">
          <i data-lucide="bar-chart-2" class="h-3.5 w-3.5"></i>
          <span>Reportes</span>
        </button>
        <button onclick="switchView('administracion')" id="nav-administracion" class="flex items-center gap-2 px-3.5 py-1.5 rounded-full text-xs font-medium transition-all duration-200 text-slate-300 hover:text-white hover:bg-slate-800">
          <i data-lucide="settings" class="h-3.5 w-3.5"></i>
          <span>Administración</span>
        </button>
      </nav>
    </div>

    <!-- COLUMNA DERECHA: ACCIONES Y PERFIL -->
    <div class="flex-1 flex items-center justify-end gap-4">
      <!-- Reloj Digital Corporativo -->
      <div class="hidden xl:flex items-center gap-2 border-r border-slate-200 dark:border-slate-800 pr-4 mr-1 select-none">
        <i data-lucide="clock" class="h-4 w-4 text-slate-400 dark:text-slate-500"></i>
        <div class="flex flex-col text-left leading-tight">
          <span id="current-date" class="text-[9px] text-slate-400 dark:text-slate-500 font-semibold">...</span>
          <span id="current-time" class="text-[12px] text-slate-700 dark:text-slate-300 font-bold font-mono tracking-wide">...</span>
        </div>
      </div>

      <!-- Widget de Alertas (Semáforo) -->
      <div id="alerts-widget-container" class="relative"></div>

      <!-- Botón de Agenda (pequeño) -->
      <button id="nav-agenda" onclick="switchView('agenda')" class="h-8 w-8 rounded-xl flex items-center justify-center border border-slate-800 hover:border-slate-700 bg-slate-950/40 text-slate-300 hover:text-white transition-all duration-200" title="Agenda de Audiencias">
        <i data-lucide="calendar" class="h-4 w-4"></i>
      </button>

      <!-- Botón de Modo Claro/Oscuro -->
      <button id="theme-toggle" onclick="toggleTheme()" class="h-8 w-8 rounded-xl flex items-center justify-center border border-slate-800 hover:border-slate-700 bg-slate-950/40 text-slate-300 hover:text-white transition-all duration-200" title="Cambiar de Modo">
        <i data-lucide="sun" class="h-4 w-4"></i>
      </button>

      <!-- Perfil del Usuario Logueado -->
      <div id="user-profile-menu" class="relative flex items-center gap-3">
        <!-- Contenedor clickeable del perfil -->
        <div onclick="toggleProfileDropdown(event)" class="flex items-center gap-2 cursor-pointer group select-none">
          <div class="text-right hidden sm:block">
            <p id="header-user-rol" class="text-xs font-semibold text-slate-200 group-hover:text-white transition-colors">Cargando...</p>
            <p id="header-user-nombre" class="text-[10px] text-slate-400 group-hover:text-slate-300 transition-colors">...</p>
          </div>
          <div id="header-user-initials" class="h-8 w-8 rounded-full bg-slate-800 border border-slate-700 flex items-center justify-center text-slate-300 font-semibold text-xs group-hover:border-brand-500 transition-all duration-150" title="Perfil de usuario">
            --
          </div>
          <i data-lucide="chevron-down" class="h-3.5 w-3.5 text-slate-400 group-hover:text-slate-200 transition-colors"></i>
        </div>

        <!-- Dropdown flotante del perfil -->
        <div id="profile-dropdown" class="hidden absolute right-0 top-10 mt-2 w-48 glass-card text-[var(--text-primary)] rounded-2xl p-2 z-50 flex flex-col gap-1">
          <button onclick="triggerEditProfile(event)" class="w-full px-3 py-2 rounded-xl text-xs font-semibold flex items-center gap-2 text-[var(--text-secondary)] hover:text-[var(--text-primary)] hover:bg-slate-50/80 dark:hover:bg-slate-800 transition-all text-left cursor-pointer border-0 bg-transparent">
            <i data-lucide="user" class="h-3.5 w-3.5 text-brand-500 dark:text-brand-400"></i>
            <span>Editar Perfil</span>
          </button>
          <button onclick="triggerAlertCenter(event)" class="w-full px-3 py-2 rounded-xl text-xs font-semibold flex items-center gap-2 text-[var(--text-secondary)] hover:text-[var(--text-primary)] hover:bg-slate-50/80 dark:hover:bg-slate-800 transition-all text-left cursor-pointer border-0 bg-transparent">
            <i data-lucide="bell" class="h-3.5 w-3.5 text-brand-500 dark:text-brand-400"></i>
            <span>Centro de Alertas</span>
          </button>
          <div class="border-t border-[var(--border-ui)] my-1"></div>
          <button onclick="logout()" class="w-full px-3 py-2 rounded-xl text-xs font-semibold flex items-center gap-2 text-rose-600 dark:text-rose-400 hover:text-rose-700 dark:hover:text-rose-300 hover:bg-rose-50 dark:hover:bg-rose-950/20 transition-all text-left cursor-pointer border-0 bg-transparent">
            <i data-lucide="log-out" class="h-3.5 w-3.5"></i>
            <span>Cerrar Sesión</span>
          </button>
          <div class="border-t border-[var(--border-ui)] my-1"></div>
          <div id="app-version" class="px-3 py-1.5 text-center text-[10px] text-slate-400 dark:text-slate-500 font-semibold select-none">
            v...
          </div>
        </div>
      </div>
    </div>
  </header>

  <!-- CUERPO PRINCIPAL (SIDEBAR + MAIN CONTENT) -->
  <div class="flex flex-1 overflow-hidden">
    
    <!-- CONTENEDOR PRINCIPAL RESPONSIVO -->
    <main class="flex-1 overflow-y-auto bg-slate-950 p-8 relative">
      <div id="top-loading-bar" class="absolute top-0 left-0 h-[3px] bg-brand-500 transition-all duration-200 w-0 opacity-0 z-50"></div>
      <div class="max-w-7xl mx-auto space-y-6" id="main-content">
        <!-- Las vistas se cargarán aquí de forma dinámica -->
      </div>
    </main>

  </div>


  <!-- MODALES COMPARTIDOS (SE CARGAN/ABREN CON JS) -->
  <div id="modal-container" class="fixed inset-0 z-50 hidden bg-slate-950/80 backdrop-blur-sm flex items-center justify-center p-4">
    <!-- El contenido del modal se inyecta dinámicamente -->
  </div>

  <!-- CÁPSULA DE ESTADO FLOTANTE -->
  <div id="system-status-capsule" class="fixed bottom-5 left-5 z-40 select-none group hidden">
    <!-- Pánel Detallado (Hover Card) -->
    <div id="system-status-hover-card" class="absolute bottom-full left-0 mb-2.5 w-64 p-3 bg-white/95 dark:bg-slate-900/95 border border-slate-200 dark:border-slate-800 rounded-2xl shadow-xl backdrop-blur-md transition-all duration-200 transform translate-y-2 opacity-0 pointer-events-none group-hover:translate-y-0 group-hover:opacity-100 group-hover:pointer-events-auto">
      <div class="text-[9px] font-bold text-slate-400 dark:text-slate-500 uppercase tracking-wider mb-2">Detalles de Conexión</div>
      <div class="space-y-1.5 text-xs text-slate-600 dark:text-slate-400">
        <div class="flex justify-between">
          <span>Base de Datos:</span>
          <span class="font-semibold text-slate-900 dark:text-slate-200">Local</span>
        </div>
        <div class="flex justify-between">
          <span>Servicio Red:</span>
          <span id="capsule-net-status" class="font-semibold text-emerald-600 dark:text-emerald-400">Conectado</span>
        </div>
        <div class="flex flex-col pt-1 border-t border-slate-100 dark:border-slate-800 mt-1">
          <span class="text-[9px] text-slate-400 dark:text-slate-500 uppercase font-bold tracking-wider">Última Sincronización</span>
          <span id="capsule-last-update" class="font-mono font-bold text-[10px] text-slate-800 dark:text-slate-300 mt-0.5">Cargando...</span>
        </div>
      </div>
    </div>

    <!-- Cápsula Base -->
    <div class="flex items-center gap-2 px-3 py-1.5 bg-white/80 dark:bg-slate-900/80 border border-slate-200 dark:border-slate-800 rounded-full shadow-lg backdrop-blur-md hover:bg-white dark:hover:bg-slate-900 transition-all duration-150 cursor-pointer">
      <span class="relative flex h-2 w-2">
        <span id="capsule-indicator-ping" class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
        <span id="capsule-indicator-dot" class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span>
      </span>
      <span id="capsule-label" class="text-[10px] text-slate-600 dark:text-slate-400 font-semibold tracking-wide">Conectado</span>
      <span id="capsule-dev-tag" class="hidden px-1.5 py-0.5 text-[8px] font-bold text-brand-600 dark:text-brand-400 bg-brand-50 dark:bg-brand-950/40 border border-brand-200/50 dark:border-brand-800/50 rounded-full">DEV</span>
    </div>
  </div>

  <!-- SCRIPTS PRINCIPALES -->
  <script src="/js/helpers.js?v=1.0.23"></script>
  <script src="/js/components.js?v=1.0.23"></script>
  <script src="/js/views.js?v=1.0.23"></script>
  <script src="/js/session-timeout.js?v=1.0.23"></script>
  <script src="/js/app.js?v=1.0.23"></script>

  <!-- Global Tooltip Element -->
  <div id="global-tooltip" class="fixed hidden z-50 bg-slate-900 border border-slate-800 text-slate-200 text-xs px-3.5 py-2.5 rounded-xl shadow-2xl backdrop-blur-md max-w-xs pointer-events-none transition-opacity duration-150 opacity-0">
    <div class="text-[9px] font-semibold text-brand-400 uppercase tracking-wider mb-1">Cargo Completo</div>
    <div id="global-tooltip-text" class="font-medium text-slate-200 leading-relaxed"></div>
  </div>
</body>
</html>
